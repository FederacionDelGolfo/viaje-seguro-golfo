<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imparables - Federación del Golfo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary-bg: #0b0f19;
            --container-bg: #131927;
            --primary-accent: #f5a623;
            --secondary-accent: #ff6b4a;
            --success-color: #00b894;
            --error-color: #ff7675;
            --text-main: #ffffff;
            --text-muted: #a4b0be;
            --font-main: 'Inter', sans-serif;
            --radius-main: 20px;
        }

        body { font-family: var(--font-main); margin: 0; padding: 20px; background-color: var(--primary-bg); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 750px; background-color: var(--container-bg); border-radius: var(--radius-main); box-shadow: 0 25px 50px rgba(0,0,0,0.6); overflow: hidden; border: 2px solid rgba(245, 166, 35, 0.1); }
        
        header { background: linear-gradient(180deg, rgba(245, 166, 35, 0.08) 0%, transparent 100%); padding: 35px 20px 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .event-logo { max-width: 260px; height: auto; animation: floating 3s ease-in-out infinite; filter: drop-shadow(0 6px 12px rgba(0,0,0,0.6)); }
        @keyframes floating { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        
        /* TÍTULO LLAMATIVO MEJORADO */
        header h1 { 
            margin: 15px 0 0; 
            font-size: 26px; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #f5a623, #ff6b4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(245, 166, 35, 0.2));
            line-height: 1.3;
        }
        header h1 span {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
            -webkit-text-fill-color: #ffffff;
            letter-spacing: 4px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .tabs { display: flex; gap: 8px; padding: 15px; background-color: rgba(0, 0, 0, 0.2); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 700; font-size: 14px; color: var(--text-muted); border-radius: 12px; text-transform: uppercase; transition: all 0.2s; }
        .tab.active { background-color: var(--primary-accent); color: #0b0f19; font-weight: 900; box-shadow: 0 4px 12px rgba(245, 166, 35, 0.2); }
        
        .card { padding: 35px 30px; display: none; }
        input { padding: 16px; margin: 10px 0; width: 100%; border-radius: 12px; background-color: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255,255,255,0.1); color: white; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: none; border-color: var(--primary-accent); }
        
        button { padding: 16px; margin: 20px 0 10px; width: 100%; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: transform 0.2s; }
        button:hover { transform: translateY(-1px); }
        .success { background: linear-gradient(135deg, var(--secondary-accent), #e04d2b); color: white; }
        .primary { background: var(--primary-accent); color: #0b0f19; }
        .download { background: transparent; color: var(--primary-accent); border: 2px solid var(--primary-accent); margin-top: 15px; }
        
        .participant { padding: 18px; background-color: rgba(0, 0, 0, 0.2); margin: 12px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.03); border-left: 4px solid var(--primary-accent); }
        .participant-info-sub { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://raw.githubusercontent.com/federaciondelgolfo/federaciondelgolfo.github.io/main/1000266768.png" alt="Imparables" class="event-logo">
            <!-- TÍTULO REDISEÑADO -->
            <h1>
                Federación del Golfo
                <span>IMPULSANDO EL DESTINO</span>
            </h1>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="showTab(0)" id="nav-tab0">Registro</div>
            <div class="tab" onclick="showTab(1)" id="nav-tab1">Escanear</div>
            <div class="tab" onclick="showTab(2)" id="nav-tab2">Lista</div>
        </div>

        <!-- REGISTRO -->
        <div id="tab0" class="card" style="display: block;">
            <input type="text" id="nombre" placeholder="NOMBRE COMPLETO" oninput="this.value = this.value.toUpperCase()">
            <input type="tel" id="telefono" placeholder="TELÉFONO" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <input type="text" id="distrito" placeholder="DISTRITO" oninput="this.value = this.value.toUpperCase()">
            <button onclick="registrar()" class="success" id="btn-registrar">Registrar y Descargar QR</button>
            
            <div id="qr-container" style="display:none; text-align:center; margin-top:25px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 14px;">
                <div style="background: white; padding: 10px; display: inline-block; border-radius: 8px;">
                    <img id="qr-ticket" src="" alt="Código QR">
                </div>
                <button onclick="descargarQR()" class="download">📥 Descargar QR</button>
            </div>
        </div>

        <!-- ESCANEAR -->
        <div id="tab1" class="card">
            <div id="qr-resultado-exito" style="font-weight:bold; color:var(--success-color); text-align:center; margin-bottom:15px; font-size:18px;"></div>
            <div id="reader" style="width: 100%; max-width: 350px; margin: auto; border-radius: 12px; overflow: hidden;"></div>
            <button onclick="iniciarEscaneo()" class="primary" style="margin-top:20px;">Activar Cámara (Admin)</button>
        </div>

        <!-- LISTA -->
        <div id="tab2" class="card">
            <input type="password" id="pass" placeholder="Contraseña de administrador">
            <button onclick="verLista()" class="primary">Ver Lista</button>
            <div id="lista_container" style="margin-top:20px; display:none;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAswPuSrqT_X6Dgp5YKrensweVwTY16EE", databaseURL: "https://viaje-federacion-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let html5QrcodeScanner = null;
        let nombreUltimoRegistro = "codigo_qr";
        
        function showTab(n) {
            document.querySelectorAll('.card').forEach((c, i) => c.style.display = (i === n) ? 'block' : 'none');
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
            if (n !== 1 && html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => html5QrcodeScanner = null);
            }
        }

        function registrar() {
            const nombre = document.getElementById('nombre').value.trim().toUpperCase();
            const telefono = document.getElementById('telefono').value.trim();
            const distrito = document.getElementById('distrito').value.trim().toUpperCase();

            if (!nombre || !telefono || !distrito) return alert("⚠️ Por favor rellena todos los campos");

            const codigo = String(Math.floor(1000 + Math.random() * 9000));
            nombreUltimoRegistro = nombre.replace(/\s+/g, '_');

            db.ref('asistentes/' + codigo).set({ nombre, telefono, distrito, codigo, checkins: {} }).then(() => {
                document.getElementById('qr-ticket').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${codigo}`;
                document.getElementById('qr-container').style.display = 'block';
                alert(`✅ Registro exitoso para ${nombre}`);
                document.getElementById('nombre').value = '';
                document.getElementById('telefono').value = '';
                document.getElementById('distrito').value = '';
            });
        }

        function descargarQR() {
            const src = document.getElementById('qr-ticket').src;
            fetch(src).then(res => res.blob()).then(blob => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `QR_${nombreUltimoRegistro}.png`;
                a.click();
            });
        }

        function iniciarEscaneo() {
            if (html5QrcodeScanner) return;
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (codigo) => {
                db.ref('asistentes/' + codigo.trim()).once('value', (snap) => {
                    if (!snap.exists()) return alert("Código no válido");
                    const p = snap.val();
                    const f = new Date().toLocaleDateString('es-MX').replace(/\//g, '-');
                    const h = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
                    let checks = p.checkins || {};
                    checks[f] = h;
                    db.ref('asistentes/' + codigo.trim() + '/checkins').set(checks).then(() => {
                        document.getElementById('qr-resultado-exito').innerText = `🎉 BIENVENIDO: ${p.nombre}`;
                    });
                });
            }, () => {});
        }

        function verLista() {
            if (document.getElementById('pass').value !== "federacion2026") return alert("Contraseña incorrecta");
            db.ref('asistentes').once('value', (snap) => {
                let html = "";
                snap.forEach(s => {
                    const p = s.val();
                    const checks = p.checkins || {};
                    let detalle = Object.entries(checks).map(([f, h]) => `<span style="display:block; margin-top:4px;">📅 ${f} - ⏰ ${h}</span>`).join('');
                    html += `
                        <div class="participant">
                            <strong>${p.nombre}</strong>
                            <div class="participant-info-sub">Distrito: ${p.distrito || 'S/D'} | Tel: ${p.telefono || 'S/T'}</div>
                            <div style="color:var(--primary-accent); font-size:12px; margin-top:6px;">${detalle || '❌ Sin asistencias aún'}</div>
                        </div>`;
                });
                document.getElementById('lista_container').innerHTML = html;
                document.getElementById('lista_container').style.display = 'block';
            });
        }
    </script>
</body>
</html>
