<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaje Seguro - Federación del Golfo</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; padding:20px; background: linear-gradient(135deg, #667eea, #764ba2);}
        .container {max-width: 900px; margin:auto; background:white; border-radius:15px; padding:20px; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
        h1 {text-align:center; color:#4a6cf7;}
        input, select, button {padding:12px; margin:10px 0; width:100%; border-radius:8px; font-size:16px;}
        button {background:#4a6cf7; color:white; border:none; cursor:pointer;}
        button.success {background:#28a745;}
        .card {background:#f8f9fa; padding:20px; border-radius:12px; margin:15px 0;}
        .participant {padding:15px; background:white; margin:10px 0; border-radius:10px; border-left:5px solid #4a6cf7;}
    </style>
</head>
<body>
    <div class="container">
        <h1>🚍 Viaje Seguro - Federación del Golfo</h1>

        <div class="card">
            <h2>Registro de Asistente</h2>
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="tel" id="telefono" placeholder="Teléfono">
            <select id="distrito">
                <option value="">Selecciona Distrito</option>
                <option value="Benito Juárez">Benito Juárez</option>
                <option value="Coyoacán">Coyoacán</option>
                <option value="Álvaro Obregón">Álvaro Obregón</option>
                <option value="Miguel Hidalgo">Miguel Hidalgo</option>
                <option value="Cuauhtémoc">Cuauhtémoc</option>
                <option value="Iztapalapa">Iztapalapa</option>
                <option value="Gustavo A. Madero">Gustavo A. Madero</option>
                <option value="Otro">Otro</option>
            </select>
            <button onclick="registrar()" class="success">Registrarme</button>
        </div>

        <div class="card">
            <h2>Lista de Asistentes (Organizador)</h2>
            <input type="password" id="pass" placeholder="Contraseña" style="width:70%">
            <button onclick="verLista()">Ver Lista</button>
            <div id="lista" style="margin-top:20px;"></div>
            <button onclick="exportar()" class="success" style="margin-top:15px">Exportar a Excel</button>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('viajeFG2026')) || [];

        function registrar() {
            const nombre = document.getElementById('nombre').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const distrito = document.getElementById('distrito').value;
            
            if (!nombre || !distrito) {
                alert("Nombre y Distrito son obligatorios");
                return;
            }

            data.push({nombre, telefono: telefono || "-", distrito, fecha: new Date().toLocaleString()});
            localStorage.setItem('viajeFG2026', JSON.stringify(data));
            
            alert("¡Registro exitoso!");
            document.getElementById('nombre').value = '';
            document.getElementById('telefono').value = '';
        }

        function verLista() {
            const pass = document.getElementById('pass').value;
            if (pass !== "federacion2026") {
                alert("Contraseña incorrecta");
                return;
            }

            const lista = document.getElementById('lista');
            let html = '<h3>Total: ' + data.length + ' participantes</h3>';
            
            const porDistrito = {};
            data.forEach(p => {
                if (!porDistrito[p.distrito]) porDistrito[p.distrito] = [];
                porDistrito[p.distrito].push(p);
            });

            Object.keys(porDistrito).sort().forEach(d => {
                html += `<h4>\( {d} ( \){porDistrito[d].length})</h4>`;
                porDistrito[d].forEach(p => {
                    html += `<div class="participant"><strong>${p.nombre}</strong> - \( {p.telefono}<br><small> \){p.fecha}</small></div>`;
                });
            });
            lista.innerHTML = html;
        }

        function exportar() {
            let csv = "Distrito,Nombre,Teléfono,Fecha\n";
            data.forEach(p => csv += `"\( {p.distrito}"," \){p.nombre}","\( {p.telefono}"," \){p.fecha}"\n`);
            const blob = new Blob([csv], {type: 'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'asistentes_federacion_golfo.csv';
            a.click();
        }
    </script>
</body>
</html>
