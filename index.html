<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaje Seguro - Federación del Golfo</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body {font-family: Arial, sans-serif; margin:0; padding:0; background: linear-gradient(135deg, #667eea, #764ba2);}
        .container {max-width: 1100px; margin:20px auto; background:white; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.3);}
        header {background:#4a6cf7; color:white; padding:20px; text-align:center;}
        .tabs {display:flex; background:#f8f9fa; border-bottom:1px solid #ddd;}
        .tab {flex:1; padding:15px; text-align:center; cursor:pointer; font-weight:bold;}
        .tab.active {background:#4a6cf7; color:white;}
        .card {padding:25px;}
        input, select {padding:12px; margin:8px 0; width:100%; border:1px solid #ddd; border-radius:8px; font-size:16px;}
        button {padding:12px 20px; margin:8px 0; border:none; border-radius:8px; background:#4a6cf7; color:white; font-size:16px; cursor:pointer;}
        button.success {background:#28a745;}
        .participant {padding:15px; background:#f8f9fa; margin:10px 0; border-radius:10px;}
        .distrito-header {background:#e3f2fd; padding:10px; margin:15px 0 10px; border-radius:8px; font-weight:bold;}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚍 Viaje Seguro By Federación del Golfo</h1>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="showTab(0)">Registro</div>
            <div class="tab" onclick="showTab(1)">Check-in QR</div>
            <div class="tab" onclick="showTab(2)">Lista por Distrito</div>
        </div>

        <!-- Registro -->
        <div id="tab0" class="card">
            <h2>Registro de Asistente</h2>
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="tel" id="telefono" placeholder="Teléfono">
            <select id="distrito">
                <option value="">Selecciona tu distrito</option>
                <option value="Benito Juárez">Benito Juárez</option>
                <option value="Coyoacán">Coyoacán</option>
                <option value="Álvaro Obregón">Álvaro Obregón</option>
                <option value="Miguel Hidalgo">Miguel Hidalgo</option>
                <option value="Cuauhtémoc">Cuauhtémoc</option>
                <option value="Iztapalapa">Iztapalapa</option>
                <option value="Gustavo A. Madero">Gustavo A. Madero</option>
                <option value="Otro">Otro</option>
            </select>
            <button onclick="registrar()" class="success">Registrarme</button>
        </div>

        <!-- Check-in -->
        <div id="tab1" class="card" style="display:none">
            <h2>Escáner QR Check-in</h2>
            <video id="video" autoplay playsinline style="width:100%; max-width:400px;"></video>
            <button onclick="iniciarEscaneo()">Iniciar Cámara</button>
            <div id="resultado" style="margin-top:15px; font-weight:bold; color:green;"></div>
        </div>

        <!-- Lista por Distrito -->
        <div id="tab2" class="card" style="display:none">
            <h2>Lista de Asistentes por Distrito</h2>
            <input type="password" id="pass" placeholder="Contraseña organizador" style="width:60%">
            <button onclick="accederLista()">Acceder</button>
            <button onclick="exportarExcel()" class="success" id="btnExport" style="display:none">Exportar Excel</button>
            <div id="lista-distritos"></div>
        </div>
    </div>

    <script>
        let participantes = JSON.parse(localStorage.getItem('viajeFG')) || [];
        const PASS = "federacion2026";

        function showTab(n) {
            document.querySelectorAll('.card').forEach((c,i) => c.style.display = i===n ? 'block' : 'none');
            document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
        }

        function registrar() {
            const nombre = document.getElementById('nombre').value.trim();
            const telefono = document.getElementById('telefono').value.trim();
            const distrito = document.getElementById('distrito').value;
            
            if (!nombre || !distrito) return alert("Nombre y Distrito son obligatorios");
            
            participantes.push({
                nombre,
                telefono: telefono || "Sin teléfono",
                distrito,
                checkin: false,
                fecha: new Date().toLocaleString()
            });
