<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imparables - Federación del Golfo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary-bg: #0b0f19;
            --container-bg: #131927;
            --primary-accent: #f5a623;
            --secondary-accent: #ff6b4a;
            --success-color: #00b894;
            --error-color: #ff7675;
            --text-main: #ffffff;
            --text-muted: #a4b0be;
            --font-main: 'Inter', sans-serif;
            --radius-main: 20px;
        }

        body { font-family: var(--font-main); margin: 0; padding: 20px; background-color: var(--primary-bg); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 750px; background-color: var(--container-bg); border-radius: var(--radius-main); box-shadow: 0 25px 50px rgba(0,0,0,0.6); overflow: hidden; border: 2px solid rgba(245, 166, 35, 0.1); }
        header { padding: 35px 20px 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .event-logo { max-width: 260px; height: auto; animation: floating 3s ease-in-out infinite; }
        @keyframes floating { 0% { transform: translateY(0px); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0px); } }
        header h1 { margin: 15px 0 0; font-size: 20px; color: var(--primary-accent); text-transform: uppercase; }
        .tabs { display: flex; gap: 8px; padding: 15px; background-color: rgba(0, 0, 0, 0.2); }
        .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-weight: 700; font-size: 14px; color: var(--text-muted); border-radius: 12px; }
        .tab.active { background-color: var(--primary-accent); color: #0b0f19; }
        .card { padding: 35px 30px; display: none; }
        input { padding: 16px; margin: 10px 0; width: 100%; border-radius: 12px; background-color: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255,255,255,0.1); color: white; box-sizing: border-box; }
        button { padding: 16px; margin: 20px 0 10px; width: 100%; border-radius: 12px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; }
        .success { background: linear-gradient(135deg, var(--secondary-accent), #e04d2b); color: white; }
        .primary { background: var(--primary-accent); color: #0b0f19; }
        .download { background: transparent; color: var(--primary-accent); border: 2px solid var(--primary-accent); }
        .participant { padding: 18px; background-color: rgba(0, 0, 0, 0.2); margin: 12px 0; border-radius: 14px; border: 1px solid rgba(255,255,255,0.03); }
        .btn-delete { background: rgba(255, 118, 117, 0.1); color: var(--error-color); border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://raw.githubusercontent.com/federaciondelgolfo/federaciondelgolfo.github.io/main/1000266768.png" alt="Logo" class="event-logo">
            <h1>🚍 Viaje Seguro</h1>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="showTab(0)" id="nav-tab0">Registro</div>
            <div class="tab" onclick="showTab(1)" id="nav-tab1">Escanear</div>
            <div class="tab" onclick="showTab(2)" id="nav-tab2">Lista</div>
        </div>

        <div id="tab0" class="card" style="display: block;">
            <input type="text" id="nombre" placeholder="NOMBRE COMPLETO" oninput="this.value = this.value.toUpperCase()">
            <input type="tel" id="telefono" placeholder="TELÉFONO" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <input type="text" id="distrito" placeholder="DISTRITO" oninput="this.value = this.value.toUpperCase()">
            <button onclick="registrar()" class="success" id="btn-registrar">Registrar y Descargar QR</button>
            <div id="qr-container" style="display:none; text-align:center;">
                <img id="qr-ticket" src="" alt="QR">
                <button onclick="descargarQR()" class="download">📥 Descargar QR</button>
            </div>
        </div>

        <div id="tab1" class="card">
            <div id="qr-resultado-exito" style="font-weight:bold; margin-bottom:10px;"></div>
            <div id="reader"></div>
            <button onclick="autenticarAdministrador()" class="primary" id="btn-auth">Escanear (Admin)</button>
        </div>

        <div id="tab2" class="card">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="verLista()" class="primary">Ver Lista</button>
            <div id="lista_container" style="display:none;"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAswPuSrqT_X6Dgp5YKrensweVwTY16EE", databaseURL: "https://viaje-federacion-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        function showTab(n) {
            document.querySelectorAll('.card').forEach((c, i) => c.style.display = (i === n) ? 'block' : 'none');
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
        }

        function registrar() {
            const nombre = document.getElementById('nombre').value.trim().toUpperCase();
            const codigo = String(Math.floor(1000 + Math.random() * 9000));
            db.ref('asistentes/' + codigo).set({ nombre, codigo, checkins: {} });
            document.getElementById('qr-ticket').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${codigo}`;
            document.getElementById('qr-container').style.display = 'block';
        }

        function procesarCheckinAutomatico(codigoInput) {
            db.ref('asistentes/' + codigoInput).once('value', (snapshot) => {
                if (!snapshot.exists()) return;
                const persona = snapshot.val();
                const fecha = new Date().toLocaleDateString('es-MX').replace(/\//g, '-');
                const hora = new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
                let checks = persona.checkins || {};
                checks[fecha] = hora;
                db.ref('asistentes/' + codigoInput + '/checkins').set(checks);
                document.getElementById('qr-resultado-exito').innerText = `✅ ${persona.nombre} - ${fecha} ${hora}`;
            });
        }

        function verLista() {
            if (document.getElementById('pass').value !== "federacion2026") return alert("Contraseña incorrecta");
            db.ref('asistentes').once('value', (snap) => {
                let html = "";
                snap.forEach(s => {
                    const p = s.val();
                    const checks = p.checkins || {};
                    let detalle = Object.entries(checks).map(([f, h]) => `📅 ${f} ⏰ ${h}`).join('<br>');
                    html += `<div class="participant"><strong>${p.nombre}</strong><br>${detalle}</div>`;
                });
                document.getElementById('lista_container').innerHTML = html;
                document.getElementById('lista_container').style.display = 'block';
            });
        }
        
        function descargarQR() { /* ... lógica de descarga ... */ }
    </script>
</body>
</html>
