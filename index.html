<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viaje Seguro - Federación del Golfo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary-bg: #10121a;
            --container-bg: #1a1e29;
            --primary-accent: #6c5ce7;
            --secondary-accent: #00cec9;
            --success-color: #00b894;
            --error-color: #ff7675;
            --text-main: #ecf0f1;
            --text-muted: #b0bec5;
            --font-main: 'Inter', sans-serif;
            --radius-main: 16px;
            --radius-tab: 10px;
        }

        body {
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(at 10% 10%, rgba(108, 92, 231, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(0, 206, 201, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 750px;
            background-color: var(--container-bg);
            border-radius: var(--radius-main);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        header {
            background-color: rgba(108, 92, 231, 0.1);
            color: var(--primary-accent);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

        .tabs { display: flex; gap: 5px; padding: 15px; background-color: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: 600; font-size: 15px; color: var(--text-muted); border-radius: var(--radius-tab); transition: all 0.2s ease; }
        .tab:hover { background-color: rgba(255,255,255,0.05); color: var(--text-main); }
        .tab.active { background-color: var(--primary-accent); color: white; box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3); }

        .card { padding: 35px 30px; display: none; }
        h2 { margin-top: 0; margin-bottom: 25px; font-size: 22px; font-weight: 600; color: var(--text-main); }

        input { padding: 16px; margin: 10px 0; width: 100%; border-radius: 10px; font-size: 16px; box-sizing: border-box; background-color: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--primary-accent); box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2); }

        button { padding: 16px; margin: 20px 0 10px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.5px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.primary { background-color: var(--primary-accent); color: white; }
        button.primary:hover { background-color: #5b4bc4; }
        button.success { background-color: var(--success-color); color: white; }
        button.success:hover { background-color: #00a383; }
        
        /* Estilo para el botón secundario de descarga */
        button.download { background-color: var(--secondary-accent); color: #10121a; margin-top: 10px; }
        button.download:hover { background-color: #00b4b1; }

        #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 12px; overflow: hidden; border: 2px dashed rgba(255,255,255,0.1); background: #000; }

        .distritos-tabs-container { display: flex; flex-wrap: wrap; gap: 6px; margin: 20px 0; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .distrito-tab { padding: 8px 14px; background-color: rgba(255,255,255,0.05); color: var(--text-muted); border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .distrito-tab.active { background-color: var(--secondary-accent); color: #10121a; font-weight: 700; }

        .distrito-panel { display: none; }
        .distrito-panel.active { display: block; animation: fadeIn 0.3s ease; }

        .participant { padding: 18px; background-color: rgba(255,255,255,0.03); margin: 12px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .participant-actions { display: flex; align-items: center; gap: 15px; }
        .participant strong { font-size: 16px; color: var(--text-main); }
        .participant-info-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        .status { padding: 8px 14px; border-radius: 30px; font-weight: 700; font-size: 12px; }
        
        .verde .status { background-color: rgba(0, 184, 148, 0.15); color: var(--success-color); }
        .rojo .status { background-color: rgba(255, 118, 117, 0.15); color: var(--error-color); }
        .time-badge { font-size: 11px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; margin-left: 5px; color: #fff;}

        .btn-delete {
            background: rgba(255, 118, 117, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(255, 118, 117, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 0;
            width: auto;
            transition: all 0.2s;
        }
        .btn-delete:hover { background: var(--error-color); color: white; }

        #qr-resultado-exito { text-align: center; color: var(--success-color); font-weight: bold; font-size: 18px; margin: 15px 0; min-height: 24px; }
        #loading { display: none; text-align: center; color: var(--secondary-accent); font-weight: bold; margin: 10px 0; }
        
        #qr-container { display: none; flex-direction: column; align-items: center; background: rgba(255,255,255,0.02); padding: 20px; margin: 20px auto 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); max-width: 240px; }
        .qr-box { width: 180px; height: 180px; background: white; padding: 10px; border-radius: 8px; display: flex; justify-content: center; align-items: center; }
        .qr-box img { width: 100%; height: 100%; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 600px) { 
            .participant { flex-direction: column; align-items: flex-start; gap: 12px; } 
            .participant-actions { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚍 Viaje Seguro - Federación del Golfo</h1>
        </header>

        <div class="tabs">
            <div class="tab active" onclick="showTab(0)" id="nav-tab0">Registro</div>
            <div class="tab" onclick="showTab(1)" id="nav-tab1">Escanear</div>
            <div class="tab" onclick="showTab(2)" id="nav-tab2">Lista</div>
        </div>

        <div id="loading">⌛ Procesando con la nube... Por favor espera.</div>

        <div id="tab0" class="card" style="display: block;">
            <h2>Registro de Asistente</h2>
            <input type="text" id="nombre" placeholder="NOMBRE COMPLETO" oninput="this.value = this.value.toUpperCase()">
            <input type="tel" id="telefono" placeholder="TELÉFONO" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <input type="text" id="distrito" placeholder="DISTRITO" oninput="this.value = this.value.toUpperCase()">
            <button onclick="registrar()" class="success" id="btn-registrar">Registrar e Imprimir Boleto</button>
            
            <div id="qr-container">
                <div class="qr-box">
                    <img id="qr-ticket" src="" alt="Código QR de Acceso">
                </div>
                <button onclick="descargarQR()" class="download" id="btn-descargar">📥 Descargar Boleto QR</button>
            </div>
        </div>

        <div id="tab1" class="card">
            <h2>Escáner de Boletos</h2>
            <div id="qr-resultado-exito"></div>
            <div id="reader"></div>
            <input type="text" id="codigo" placeholder="O TECLEA EL CÓDIGO MANUAL" maxlength="4" style="text-align: center; font-weight: bold; margin-top:20px;">
            <button onclick="hacerCheckinManual()" class="primary" id="btn-checkin">Check-in Manual</button>
        </div>

        <div id="tab2" class="card">
            <h2>Lista de Participantes</h2>
            <input type="password" id="pass" placeholder="Contraseña de acceso">
            <button onclick="verLista()" class="primary">Ver Lista</button>
            
            <div id="lista_container" style="margin-top:20px; display: none;">
                <div id="distritos_tabs" class="distritos-tabs-container"></div>
                <div id="distritos_paneles"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAswPuSrqT_X6Dgp5YKrensweVwTY16EE",
            authDomain: "viaje-federacion.firebaseapp.com",
            databaseURL: "https://viaje-federacion-default-rtdb.firebaseio.com/",
            projectId: "viaje-federacion",
            storageBucket: "viaje-federacion.appspot.com",
            messagingSenderId: "367004191433",
            appId: "1:367004191433:web:9ec4c3455e8a2f1dc68bdc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let html5QrcodeScanner = null;
        let nombreUltimoRegistro = "boleto"; // Variable para nombrar el archivo de descarga

        function showTab(n) {
            const cards = document.querySelectorAll('.card');
            const tabs = document.querySelectorAll('.tab');
            cards.forEach((c, i) => c.style.display = (i === n) ? 'block' : 'none');
            tabs.forEach((t, i) => t.classList.toggle('active', i === n));
            
            if (n === 1) {
                encenderEscaner();
            } else {
                apagarEscaner();
            }
        }

        function toggleLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('btn-registrar').disabled = show;
        }

        function registrar() {
            const nombre = document.getElementById('nombre').value.trim().toUpperCase();
            const telefono = document.getElementById('telefono').value.trim();
            const distrito = document.getElementById('distrito').value.trim().toUpperCase();

            if (!nombre || !telefono || !distrito) {
                alert("⚠️ Por favor, rellena todos los campos.");
                return;
            }

            const codigo = String(Math.floor(1000 + Math.random() * 9000));
            toggleLoading(true);

            db.ref('asistentes/' + codigo).set({
                nombre: nombre,
                distrito: distrito,
                telefono: telefono,
                codigo: codigo,
                checkin: "No",
                checkinFecha: "",
                fechaRegistro: new Date().toLocaleString('es-MX')
            }, (error) => {
                toggleLoading(false);
                if (error) {
                    alert("Error en Firebase: " + error.message);
                } else {
                    nombreUltimoRegistro = nombre.replace(/\s+/g, '_'); // Guardar nombre limpio para el archivo
                    
                    // Generar código QR gráfico
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${codigo}`;
                    document.getElementById('qr-ticket').src = qrUrl;
                    document.getElementById('qr-container').style.display = 'flex';
                    
                    alert(`✅ ¡Registro completo para ${nombre}!\nPuedes descargar el código QR usando el nuevo botón de abajo.`);
                    
                    document.getElementById('nombre').value = '';
                    document.getElementById('telefono').value = '';
                    document.getElementById('distrito').value = '';
                }
            });
        }

        // 🔥 NUEVA FUNCIÓN PARA DESCARGAR EL QR DIRECTAMENTE
        function descargarQR() {
            const imgElement = document.getElementById('qr-ticket');
            if (!imgElement.src) return;

            // Convertir la imagen externa en un archivo descargable de inmediato
            fetch(imgElement.src)
                .then(response => response.blob())
                .then(blob => {
                    const blobUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = `QR_${nombreUltimoRegistro}.png`; // Nombre personalizado
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);
                })
                .catch(err => {
                    // Si falla por permisos del navegador, abre la imagen en una pestaña limpia para guardarla
                    window.open(imgElement.src, '_blank');
                });
        }

        function encenderEscaner() {
            if (html5QrcodeScanner) return;

            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (codigoDetectado) => {
                    procesarCheckinAutomatico(codigoDetectado.trim());
                },
                (error) => {}
            ).catch(err => {
                console.error("Error de cámara: ", err);
            });
        }

        function apagarEscaner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner = null;
                    document.getElementById('reader').innerHTML = "";
                }).catch(err => console.log(err));
            }
        }

        function procesarCheckinAutomatico(codigoInput) {
            if (!codigoInput) return;

            db.ref('asistentes/' + codigoInput).once('value').then((snapshot) => {
                if (!snapshot.exists()) {
                    document.getElementById('qr-resultado-exito').innerHTML = "❌ Código QR Inválido";
                    document.getElementById('qr-resultado-exito').style.color = "var(--error-color)";
                    return;
                }

                const persona = snapshot.val();
                if (persona.checkin === "Si") {
                    document.getElementById('qr-resultado-exito').innerHTML = `ℹ️ ${persona.nombre} ya tiene check-in`;
                    document.getElementById('qr-resultado-exito').style.color = "var(--secondary-accent)";
                } else {
                    const ahora = new Date();
                    const horaLimpia = ahora.toLocaleDateString('es-MX') + ' ' + ahora.toLocaleTimeString('es-MX');

                    db.ref('asistentes/' + codigoInput).update({
                        checkin: "Si",
                        checkinFecha: horaLimpia
                    }).then(() => {
                        document.getElementById('qr-resultado-exito').innerHTML = `🎉 ✅ ¡BIENVENIDO, ${persona.nombre}!`;
                        document.getElementById('qr-resultado-exito').style.color = "var(--success-color)";
                        try { navigator.vibrate(200); } catch(e){}
                    });
                }
            });
        }

        function hacerCheckinManual() {
            const cod = document.getElementById('codigo').value.trim();
            if(!cod) return alert("Escribe un código");
            procesarCheckinAutomatico(cod);
            document.getElementById('codigo').value = '';
        }

        function verLista() {
            const pass = document.getElementById('pass').value;
            if (pass !== "federacion2026") {
                alert("❌ Contraseña incorrecta.");
                document.getElementById('lista_container').style.display = 'none';
                return;
            }

            toggleLoading(true);

            db.ref('asistentes').once('value').then((snapshot) => {
                toggleLoading(false);
                const tabsContainer = document.getElementById('distritos_tabs');
                const panelesContainer = document.getElementById('distritos_paneles');
                document.getElementById('lista_container').style.display = 'block';

                if (!snapshot.exists()) {
                    tabsContainer.innerHTML = "";
                    panelesContainer.innerHTML = "<p>No hay registros todavía.</p>";
                    return;
                }

                const porDistrito = {};
                snapshot.forEach((childSnapshot) => {
                    const p = childSnapshot.val();
                    const distName = p.distrito || "SIN DISTRITO";
                    if (!porDistrito[distName]) porDistrito[distName] = [];
                    porDistrito[distName].push(p);
                });

                const distritosOrdenados = Object.keys(porDistrito).sort();
                let tabsHtml = "";
                let panelesHtml = "";

                distritosOrdenados.forEach((dist, index) => {
                    const isActive = index === 0 ? 'active' : '';
                    tabsHtml += `<div class="distrito-tab ${isActive}" onclick="showDistritoTab('${dist}')" id="tab-link-${dist}">${dist} (${porDistrito[dist].length})</div>`;
                    
                    panelesHtml += `<div class="distrito-panel ${isActive}" id="panel-dist-${dist}">`;
                    porDistrito[dist].forEach(p => {
                        const esPresente = p.checkin === "Si";
                        const horaCheckin = esPresente && p.checkinFecha ? p.checkinFecha.split(' ')[1] : '';
                        
                        panelesHtml += `
                            <div class="participant ${esPresente ? 'verde' : 'rojo'}" id="row-${p.codigo}">
                                <div class="participant-info">
                                    <strong>${p.nombre}</strong>
                                    <div class="participant-info-sub">Tel: ${p.telefono} | Cód: ${p.codigo}</div>
                                </div>
                                <div class="participant-actions">
                                    <div class="status">
                                        ${esPresente ? `✅ LISTO <span class="time-badge">${horaCheckin}</span>` : '❌ PENDIENTE'}
                                    </div>
                                    <button class="btn-delete" onclick="eliminarRegistro('${p.codigo}', '${p.nombre}')" title="Eliminar asistente">🗑️</button>
                                </div>
                            </div>`;
                    });
                    panelesHtml += `</div>`;
                });

                tabsContainer.innerHTML = tabsHtml;
                panelesContainer.innerHTML = panelesHtml;
            });
        }

        function eliminarRegistro(codigo, nombre) {
            if (!confirm(`⚠️ ¿Eliminar a "${nombre}"?`)) return;
            toggleLoading(true);
            db.ref('asistentes/' + codigo).remove().then(() => {
                toggleLoading(false);
                verLista();
            });
        }

        function showDistritoTab(distritoSeleccionado) {
            document.querySelectorAll('.distrito-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.distrito-tab').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`panel-dist-${distritoSeleccionado}`).classList.add('active');
            document.getElementById(`tab-link-${distritoSeleccionado}`).classList.add('active');
        }
    </script>
</body>
</html>
